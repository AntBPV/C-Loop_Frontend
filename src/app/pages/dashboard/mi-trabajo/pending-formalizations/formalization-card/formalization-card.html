<div class="flex items-center justify-between p-4 rounded-2xl border-2 border-surface-gray-200 bg-background hover:border-ui-red transition-colors duration-200">

  <div class="flex flex-col gap-1">

    <p class="font-montserrat text-surface-gray-600">
      {{ formalization.convenioCode }}
    </p>

    <p class="font-poppins text-surface-gray-400 text-sm">
      {{ formalization.companyName }}
    </p>

    <div class="flex items-center gap-2 mt-1">

      <span class="font-inter text-xs px-2 py-1 rounded-lg bg-surface-red text-ui-red">
        {{ formalization.status }}
      </span>

      <span class="font-inter text-xs px-2 py-1 rounded-lg bg-surface-gray-100 text-surface-gray-500">
        {{ formalization.convenioType }}
      </span>

    </div>

  </div>

  <span class="font-inter text-surface-gray-400 text-xs">
    {{ formalization.updatedAt | date:'dd/MM/yyyy' }}
  </span>

</div>
