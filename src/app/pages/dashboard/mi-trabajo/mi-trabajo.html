<div class="flex flex-col gap-8">

  @if (isLoading()) {
    <p class="font-poppins text-surface-gray-400">Cargando...</p>

  } @else if (error()) {
    <p class="font-poppins text-ui-red">{{ error() }}</p>

  } @else if (data()) {
    <app-pending-approvals
      [approvals]="data()!.pendingApprovals">
    </app-pending-approvals>

    <!-- Formalizaciones pendientes -->
<!--    <app-pending-formalizations-->
<!--    [formalizations]="data()!.pendingFormalizations">-->
<!--    </app-pending-formalizations>-->

  }

</div>
