<div class="flex flex-col gap-6 p-6 rounded-2xl border-2 border-surface-gray-200 bg-background">

  <div class="flex flex-col gap-2">
    <h2 class="font-montserrat text-xl text-surface-gray-600">
      Revisión institucional
    </h2>
    <p class="font-poppins text-surface-gray-500 text-sm">
      Registra el resultado de la revisión institucional del convenio.
    </p>
  </div>

  <div class="flex flex-col gap-2">
    <label class="font-inter text-sm text-surface-gray-500">
      Comentario
    </label>
    <textarea
      [ngModel]="comment()"
      (ngModelChange)="comment.set($event)"
      rows="5"
      placeholder="Escribe un comentario de revisión..."
      class="w-full rounded-lg border-2 border-surface-gray-200 px-4 py-3 font-inter text-sm resize-none outline-none focus:border-ui-blue">
    </textarea>
  </div>

  @if (error) {
    <p class="font-poppins text-sm text-ui-red">
      {{ error }}
    </p>
  }

  <div class="flex flex-wrap justify-end gap-3 font-inter">
    @if (canRequestCorrection) {
      <button
        (click)="submit('request-correction')"
        [disabled]="isLoading"
        class="px-4 py-2 rounded-xl border-2 border-ui-yellow text-ui-yellow hover:bg-ui-yellow hover:text-background hover:cursor-pointer active:bg-ui-yellow-active active:text-background disabled:opacity-50 transition-colors duration-200">
        Solicitar corrección
      </button>
    }

    @if (canReject) {
      <button
        (click)="submit('reject')"
        [disabled]="isLoading"
        class="px-4 py-2 rounded-xl border-2 border-ui-red text-ui-red hover:bg-ui-red hover:text-background hover:cursor-pointer active:bg-ui-red-active active:text-background disabled:opacity-50 transition-colors duration-200">
        Rechazar
      </button>
    }
    @if (canApprove) {

      <button
        (click)="submit('approve')"
        [disabled]="isLoading"
        class="px-4 py-2 rounded-xl bg-ui-blue text-background hover:bg-ui-blue-hover disabled:opacity-50 hover:cursor-pointer active:bg-ui-blue-active  transition-colors duration-200">
        @if (isLoading) {
          Procesando...
        } @else {
          Aprobar
        }
      </button>

    }

  </div>

</div>
