<div
  class="modal-overlay"
  (click)="close()">

  <div
    class="modal-container max-w-xl"
    (click)="$event.stopPropagation()">

    <div class="flex flex-col gap-6">

      <div class="flex items-start justify-between gap-4">

        <div class="flex flex-col gap-2">

          <span class="font-montserrat text-xl text-surface-gray-600">
            Solicitar documentos
          </span>

          <p class="font-poppins text-surface-gray-500 text-sm">
            Esta acción notificará a la empresa asociada para que suba los documentos requeridos del convenio.
          </p>

          <p class="font-poppins text-ui-yellow-hover text-sm">
            Una vez iniciado este proceso el convenio avanzará a revisión documental.
          </p>

        </div>

        <button
          (click)="close()"
          class="text-surface-gray-500 hover:text-ui-red hover:cursor-pointer transition-colors duration-200">

          ✕

        </button>

      </div>

      @if (error()) {

        <div class="rounded-xl bg-surface-red p-3">

          <p class="font-poppins text-ui-red text-sm">
            {{ error() }}
          </p>

        </div>

      }

      <div class="flex justify-end gap-3">

        <button
          (click)="close()"
          class="px-4 py-2 rounded-xl border-2 border-surface-gray-300 text-surface-gray-500 hover:bg-surface-gray-100 hover:cursor-pointer">

          Cancelar

        </button>

        <button
          (click)="requestCompanyDocuments()"
          [disabled]="isRequestingDocuments()"
          class="px-4 py-2 rounded-xl bg-ui-yellow text-background hover:bg-ui-yellow-hover hover:cursor-pointer disabled:opacity-50">

          @if (isRequestingDocuments()) {

            Enviando...

          } @else {

            Solicitar documentos

          }

        </button>

      </div>

    </div>

  </div>

</div>
