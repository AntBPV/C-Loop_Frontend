<nav class="sidebar">

  <!-- Logo -->
  <div class="sidebar-logo">
    <img src="vectors/UCC-Vector.svg" alt="C-Loop" class="h-10 w-auto" />
  </div>

  <div class="separator"></div>

  <!-- Links -->
  <div class="flex flex-col gap-2">

    <a
    routerLink="convenios"
    routerLinkActive="nav-item-active"
    #conveniosLink="routerLinkActive"
    class="nav-item">
      <span class="text-xl">
        <app-svg-icon
          [src]="conveniosLink.isActive ? 'icons/convenios-button-active.svg' : 'icons/convenios-button.svg'"
          color="currentColor"/>
      </span>
      <span class="font-poppins">Convenios</span>
    </a>

    <a
    routerLink="empresas"
    routerLinkActive="nav-item-active"
    #empresasLink="routerLinkActive"
    class="nav-item">
      <span class="text-2xl">
        <app-svg-icon
          [src]="empresasLink.isActive ? 'icons/empresas-button-active.svg' : 'icons/empresas-button.svg'"
          color="currentColor"/>
      </span>
      <span class="font-poppins">Empresas</span>
    </a>

  </div>

  <!-- Spacer -->
  <div class="flex-1"></div>

  <div class="separator"></div>

  <!-- Menu usuario -->
  <div class="user-menu-wrapper">

    <!-- Dropdown -->
    @if (menuAbierto()) {
      <div class="user-dropdown">

        <!-- Info usuario -->
        <div class="flex flex-col gap-1 px-3 py-2">
          <p class="font-montserrat text-surface-gray-600 text-sm">{{ usuario()?.fullName ?? '...' }}</p>
          <p class="font-inter text-surface-gray-400 text-xs">{{ usuario()?.email ?? '' }}</p>
          <div class="flex flex-wrap gap-1 mt-1">
            @for (rol of usuario()?.roles ?? []; track rol) {
              <span class="font-inter text-xs px-2 py-1 rounded-lg bg-surface-blue text-ui-blue">
                {{ rol }}
              </span>
            }
          </div>
        </div>

<!--        <div class="separator"></div>-->

        <!-- TODO: Perfil — pendiente endpoints de actualización -->
<!--        <button class="nav-item opacity-40 cursor-not-allowed w-full">-->
<!--          <span class="text-xl">-->
<!--            <app-svg-icon src="icons/perfil.svg" color="currentColor"/>-->
<!--          </span>-->
<!--          <span class="font-poppins text-sm">Mi perfil</span>-->
<!--        </button>-->

        <div class="separator"></div>

        <!-- Cerrar sesión -->
        <button (click)="cerrarSesion()" class="nav-item w-full">
          <span class="text-xl">
            <app-svg-icon src="icons/logout.svg" color="var(--color-ui-red)"/>
          </span>
          <span class="font-poppins text-sm text-ui-red">Cerrar sesión</span>
        </button>

      </div>
    }

    <!-- Botón trigger -->
    <button (click)="toggleMenu()" class="nav-item w-full">
      <span class="text-xl">
        <app-svg-icon src="icons/menu.svg" color="currentColor"/>
      </span>
      <span class="font-poppins truncate text-xl">Usuario</span>
    </button>

  </div>

</nav>
